<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Temperature Converter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #f0c040;
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      text-align: center;
      margin-bottom: 40px;
    }

    .card {
      background: #16213e;
      border: 1px solid rgba(0,255,136,0.2);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .form-group {
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #00ff88;
      margin-bottom: 8px;
    }

    input[type="number"] {
      width: 100%;
      padding: 13px 16px;
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="number"]:focus {
      border-color: #00ff88;
    }

    input[type="number"]::placeholder { color: #555; }

    /* Radio buttons */
    .radio-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .radio-option {
      flex: 1;
      min-width: 120px;
    }

    .radio-option input[type="radio"] { display: none; }

    .radio-option label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px 16px;
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: none;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }

    .radio-option input[type="radio"]:checked + label {
      background: rgba(0,255,136,0.1);
      border-color: #00ff88;
      color: #00ff88;
    }

    .radio-option label:hover { border-color: rgba(0,255,136,0.4); color: #ccc; }

    /* Convert button */
    .btn-convert {
      width: 100%;
      padding: 14px;
      background: #00ff88;
      color: #0d0d0d;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-top: 6px;
    }

    .btn-convert:hover { background: #00cc6a; transform: translateY(-2px); }
    .btn-convert:active { transform: translateY(0); }

    /* Result */
    .result-box {
      margin-top: 24px;
      background: #1a1a2e;
      border: 1px solid rgba(0,255,136,0.25);
      border-radius: 10px;
      padding: 20px 24px;
      text-align: center;
      display: none;
    }

    .result-box.show { display: block; }

    .result-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 8px;
    }

    .result-value {
      font-size: 36px;
      font-weight: 700;
      color: #00ff88;
    }

    .result-unit {
      font-size: 18px;
      color: #888;
      margin-left: 6px;
    }

    .result-all {
      margin-top: 16px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .result-pill {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 13px;
      color: #aaa;
    }

    .result-pill span { color: #f0c040; font-weight: 600; }

    /* Error */
    .error-msg {
      color: #ff5555;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    .error-msg.show { display: block; }

    /* Reset */
    .btn-reset {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      background: transparent;
      color: #555;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .btn-reset:hover { color: #aaa; border-color: rgba(255,255,255,0.2); }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
      h1 { font-size: 20px; }
    }
  </style>
</head>
<body>

  <h1>Temperature Converter</h1>
  <p class="subtitle">Convert between Celsius, Fahrenheit & Kelvin instantly</p>

  <div class="card">

    <!-- Input -->
    <div class="form-group">
      <label>Enter Temperature</label>
      <input type="number" id="tempInput" placeholder="e.g. 100" />
      <div class="error-msg" id="errorMsg">⚠ Please enter a valid number.</div>
    </div>

    <!-- Unit Selection -->
    <div class="form-group">
      <label>Convert From</label>
      <div class="radio-group">
        <div class="radio-option">
          <input type="radio" name="unit" id="celsius" value="celsius" checked />
          <label for="celsius">🌡 Celsius</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="unit" id="fahrenheit" value="fahrenheit" />
          <label for="fahrenheit">🌡 Fahrenheit</label>
        </div>
        <div class="radio-option">
          <input type="radio" name="unit" id="kelvin" value="kelvin" />
          <label for="kelvin">🌡 Kelvin</label>
        </div>
      </div>
    </div>

    <!-- Button -->
    <button class="btn-convert" onclick="convert()">Convert →</button>

    <!-- Result -->
    <div class="result-box" id="resultBox">
      <div class="result-label">Converted Result</div>
      <div>
        <span class="result-value" id="resultValue">--</span>
        <span class="result-unit" id="resultUnit"></span>
      </div>
      <div class="result-all" id="resultAll"></div>
    </div>

    <button class="btn-reset" onclick="reset()">Reset</button>

  </div>

  <script>
    function convert() {
      const input = document.getElementById('tempInput').value.trim();
      const unit = document.querySelector('input[name="unit"]:checked').value;
      const errorMsg = document.getElementById('errorMsg');
      const resultBox = document.getElementById('resultBox');

      // Validate
      if (input === '' || isNaN(input)) {
        errorMsg.classList.add('show');
        resultBox.classList.remove('show');
        return;
      }

      errorMsg.classList.remove('show');
      const temp = parseFloat(input);

      let celsius, fahrenheit, kelvin;

      if (unit === 'celsius') {
        celsius = temp;
        fahrenheit = (temp * 9/5) + 32;
        kelvin = temp + 273.15;
      } else if (unit === 'fahrenheit') {
        celsius = (temp - 32) * 5/9;
        fahrenheit = temp;
        kelvin = celsius + 273.15;
      } else {
        kelvin = temp;
        celsius = temp - 273.15;
        fahrenheit = (celsius * 9/5) + 32;
      }

      // Primary result (the other two)
      const primaryLabels = { celsius: 'Fahrenheit', fahrenheit: 'Celsius', kelvin: 'Celsius' };
      const primaryValues = { celsius: fahrenheit.toFixed(2), fahrenheit: celsius.toFixed(2), kelvin: celsius.toFixed(2) };
      const primaryUnits = { celsius: '°F', fahrenheit: '°C', kelvin: '°C' };

      document.getElementById('resultValue').textContent = primaryValues[unit];
      document.getElementById('resultUnit').textContent = primaryUnits[unit];

      // All conversions
      document.getElementById('resultAll').innerHTML = `
        <div class="result-pill">°C <span>${celsius.toFixed(2)}</span></div>
        <div class="result-pill">°F <span>${fahrenheit.toFixed(2)}</span></div>
        <div class="result-pill">K <span>${kelvin.toFixed(2)}</span></div>
      `;

      resultBox.classList.add('show');
    }

    function reset() {
      document.getElementById('tempInput').value = '';
      document.getElementById('resultBox').classList.remove('show');
      document.getElementById('errorMsg').classList.remove('show');
      document.querySelector('input[value="celsius"]').checked = true;
    }

    // Allow Enter key
    document.getElementById('tempInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') convert();
    });
  </script>

</body>
</html>
